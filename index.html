<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub | MINDxSOUL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <span>AI Hub</span>
            </div>
            <nav>
                <div class="nav-item active"><i class="fas fa-comment"></i> Chat</div>
                <div class="nav-item"><i class="fas fa-atom"></i> Physics Lab</div>
                <div class="nav-item"><i class="fas fa-map-marked-alt"></i> Travel Gems</div>
            </nav>
            <div class="user-info">
                <p>Status: <span id="status">Online</span></p>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h2>Gemini AI Assistant</h2>
                <button id="clear-chat">Clear History</button>
            </header>

            <div id="chat-window" class="chat-window">
                <div class="message ai-message">
                    Hello! I'm your AI assistant. Ask me anything about Physics, Travel, or Coding.
                </div>
                </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Type your message here...">
                    <button id="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
